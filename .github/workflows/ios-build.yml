name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build iOS framework (Debug)
        run: ./gradlew :composeApp:linkDebugFrameworkIosArm64 :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS framework (Release)
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 :composeApp:linkReleaseFrameworkIosSimulatorArm64

      - name: Upload Debug frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-frameworks
          path: |
            composeApp/build/bin/iosArm64/debugFramework/ComposeApp.framework
            composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
          retention-days: 14

      - name: Upload Release frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-frameworks
          path: |
            composeApp/build/bin/iosArm64/releaseFramework/ComposeApp.framework
            composeApp/build/bin/iosSimulatorArm64/releaseFramework/ComposeApp.framework
          retention-days: 14
