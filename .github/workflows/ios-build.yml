name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SCHEME: iosApp
  PROJECT: iosApp/iosApp.xcodeproj
  CONFIGURATION: Release

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build iOS framework (Debug)
        run: ./gradlew :composeApp:linkDebugFrameworkIosArm64 :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS framework (Release)
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 :composeApp:linkReleaseFrameworkIosSimulatorArm64

      # Code Signing Setup (requires GitHub Secrets)
      - name: Install Apple Certificate
        if: ${{ secrets.IOS_CERTIFICATE != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: ${{ secrets.IOS_PROVISIONING_PROFILE != '' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_PATH"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH/profile.mobileprovision"

      - name: Build iOS App (Archive)
        run: |
          xcodebuild archive \
            -project $PROJECT \
            -scheme $SCHEME \
            -configuration $CONFIGURATION \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_SIGNING_IDENTITY || 'Apple Development' }}" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            ${{
              secrets.IOS_CERTIFICATE == '' &&
              'CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO' ||
              ''
            }}

      - name: Export IPA
        if: ${{ secrets.IOS_CERTIFICATE != '' }}
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS }}
        run: |
          # Create export options plist
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          if [ -n "$EXPORT_OPTIONS_PLIST" ]; then
            echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH
          else
            cat > $EXPORT_OPTS_PATH << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          fi

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist $EXPORT_OPTS_PATH \
            -exportPath $RUNNER_TEMP/build

      - name: Upload Debug frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-frameworks
          path: |
            composeApp/build/bin/iosArm64/debugFramework/ComposeApp.framework
            composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
          retention-days: 14

      - name: Upload Release frameworks
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-frameworks
          path: |
            composeApp/build/bin/iosArm64/releaseFramework/ComposeApp.framework
            composeApp/build/bin/iosSimulatorArm64/releaseFramework/ComposeApp.framework
          retention-days: 14

      - name: Upload IPA
        if: ${{ secrets.IOS_CERTIFICATE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa
          path: ${{ runner.temp }}/build/*.ipa
          retention-days: 14

      - name: Clean up keychain
        if: ${{ always() && secrets.IOS_CERTIFICATE != '' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
